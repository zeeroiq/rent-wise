name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main
      deploy_dir:
        description: Optional remote install directory override
        required: false
        default: ""

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build deployable jar
        working-directory: backend
        run: ./gradlew clean bootJar

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: rent-wise-jar
          path: backend/build/libs/rent-wise.jar
          if-no-files-found: error

  deploy:
    needs: package
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT_SECRET: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_DIR_SECRET: ${{ secrets.DEPLOY_DIR }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: rent-wise-jar
          path: dist

      - name: Prepare deploy diagnostics directory
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/deploy-debug"
          echo "DEPLOY_DEBUG_DIR=${RUNNER_TEMP}/deploy-debug" >> "${GITHUB_ENV}"

      - name: Validate deployment configuration
        run: |
          set -Eeuo pipefail
          trap 'status=$?; echo "::error::Deployment configuration failed on line ${LINENO}: ${BASH_COMMAND}"; exit ${status}' ERR
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              exit 1
            fi
          done

          if [ -n "${{ inputs.deploy_dir }}" ]; then
            remote_deploy_dir="${{ inputs.deploy_dir }}"
          elif [ -n "${DEPLOY_DIR_SECRET}" ]; then
            remote_deploy_dir="${DEPLOY_DIR_SECRET}"
          else
            remote_deploy_dir="/opt/rent-wise"
          fi

          echo "DEPLOY_PORT=${DEPLOY_PORT_SECRET:-22}" >> "${GITHUB_ENV}"
          echo "REMOTE_DEPLOY_DIR=${remote_deploy_dir}" >> "${GITHUB_ENV}"

      - name: Add Remote to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Configure SSH
        run: |
          set -Eeuo pipefail
          trap 'status=$?; echo "::error::SSH setup failed on line ${LINENO}: ${BASH_COMMAND}"; exit ${status}' ERR
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Use id_rsa for all key types since SSH doesn't care about filename
          key_file=id_rsa
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/$key_file
          chmod 600 ~/.ssh/$key_file
          ssh-keyscan -H "${DEPLOY_HOST}" 2>&1 | tee "${DEPLOY_DEBUG_DIR}/ssh-keyscan.log" >> ~/.ssh/known_hosts
          echo "SSH_KEY_FILE=~/.ssh/$key_file" >> $GITHUB_ENV

      - name: Upload artifact and deploy script
        run: |
          set -Eeuo pipefail
          trap 'status=$?; echo "::error::Artifact upload failed on line ${LINENO}: ${BASH_COMMAND}"; exit ${status}' ERR
          scp -i $SSH_KEY_FILE -o ConnectTimeout=10 \
            dist/rent-wise.jar \
            scripts/deploy.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/" 2>&1 | tee "${DEPLOY_DEBUG_DIR}/scp.log"

      - name: Restart remote application
        run: |
          set -Eeuo pipefail
          trap 'status=$?; echo "::error::Remote restart failed on line ${LINENO}: ${BASH_COMMAND}"; exit ${status}' ERR
          ssh -i $SSH_KEY_FILE -o ConnectTimeout=10 "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod +x /tmp/deploy.sh && APP_NAME=rent-wise DEPLOY_DIR='${REMOTE_DEPLOY_DIR}' JAR_SOURCE=/tmp/rent-wise.jar /tmp/deploy.sh" \
            2>&1 | tee "${DEPLOY_DEBUG_DIR}/remote-deploy.log"

      - name: Collect remote logs on failure
        if: failure()
        run: |
          set +e
          if [ -f "$SSH_KEY_FILE" ] && [ -n "${DEPLOY_HOST}" ] && [ -n "${DEPLOY_USER}" ]; then
            ssh -i "$SSH_KEY_FILE" -o ConnectTimeout=10 "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "echo '== release dir =='; ls -la '${REMOTE_DEPLOY_DIR}' || true; \
               echo '== logs dir =='; ls -la '${REMOTE_DEPLOY_DIR}/logs' || true; \
               echo '== application log tail =='; tail -n 200 '${REMOTE_DEPLOY_DIR}/logs/application.log' || true; \
               echo '== pid file =='; cat '${REMOTE_DEPLOY_DIR}/rent-wise.pid' || true" \
              > "${DEPLOY_DEBUG_DIR}/remote-debug.log" 2>&1 || true
          else
            echo "SSH configuration not available; skipping remote log collection." > "${DEPLOY_DEBUG_DIR}/remote-debug.log"
          fi

      - name: Upload deploy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-debug-${{ github.run_id }}
          path: ${{ env.DEPLOY_DEBUG_DIR }}
          if-no-files-found: warn
