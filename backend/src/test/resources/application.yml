spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  frontend-base-url: http://localhost:5173
  otp:
    length: 6
    ttl-minutes: 10
    expose-dev-code: true
  cors:
    allowed-origins:
      - http://localhost:5173

