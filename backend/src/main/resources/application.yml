spring:
  application:
    name: rentwise-backend
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:h2:file:./data/rentwise;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  mail:
    from: ${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
  sms:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
  otp:
    length: 6
    ttl-minutes: 10
    expose-dev-code: true
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:4173
      - http://127.0.0.1:4173
