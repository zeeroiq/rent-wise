spring:
  application:
    name: rentwise-backend
  datasource:
    url: jdbc:h2:file:./data/rentwise;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  otp:
    length: 6
    ttl-minutes: 10
    expose-dev-code: true
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:4173
      - http://127.0.0.1:4173
